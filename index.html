<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manmeet Kaur | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* FLOATING ICONS */
.floating i {
  position:absolute;
  font-size:30px;
  animation:float 6s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}

.floating i:nth-child(1){top:10%; left:10%;}
.floating i:nth-child(2){top:20%; left:80%;}
.floating i:nth-child(3){top:70%; left:20%;}
.floating i:nth-child(4){top:80%; left:70%;}

/* HEADER */
header {
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#667eea,#764ba2);
}

header img {
  width:120px;
  border-radius:50%;
  margin-bottom:15px;
}

/* TYPING */
#typing {
  font-size:1.5rem;
  color:#fff;
}

/* SOCIAL */
.social a {
  margin:10px;
  padding:10px 15px;
  background:white;
  color:black;
  border-radius:20px;
  text-decoration:none;
  transition:0.3s;
}

.social a:hover {
  background:black;
  color:white;
}

.container {
  padding:40px;
  max-width:1100px;
  margin:auto;
}

.card {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  margin-bottom:20px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.skills {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.skill {
  background:#667eea;
  padding:8px 15px;
  border-radius:20px;
}

.btn {
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:#000;
  border-radius:25px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<!-- FLOATING ICONS -->
<div class="floating">
  <i class="fa-brands fa-linux"></i>
  <i class="fa-brands fa-docker"></i>
  <i class="fa-brands fa-github"></i>
  <i class="fa-solid fa-server"></i>
</div>

<header>

<img src="https://via.placeholder.com/120" alt="profile">

<h1>Hi, I'm Manmeet 👋</h1>

<p id="typing"></p>

<div class="social">
<a href="https://github.com/Manmeetkaur14" target="_blank"><i class="fa-brands fa-github"></i></a>
<a href="https://linkedin.com/in/YOUR-USERNAME" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
<a href="https://instagram.com/YOUR-USERNAME" target="_blank"><i class="fa-brands fa-instagram"></i></a>
</div>

<a href="./Manmeet_Kaur.Sohail.pdf" target="_blank" class="btn">
  <i class="fa-solid fa-download"></i> View CV
</a>

</header>

<div class="container">

<div class="card">
<h2>About Me</h2>
<p>Born in Pathankot 🎂 | Based in Pune 📍<br>
IT Infrastructure Analyst II with strong Linux & DevOps skills.</p>
</div>

<div class="card">
<h2>Skills</h2>
<div class="skills">
<div class="skill">Linux</div>
<div class="skill">RHEL</div>
<div class="skill">Docker</div>
<div class="skill">Git</div>
<div class="skill">Networking</div>
<div class="skill">MFA</div>
</div>
</div>

</div>

<script>
const text = "IT Infrastructure Analyst II | Linux | AWS | DevOps 🚀";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();
</script>

</body>
</html>
