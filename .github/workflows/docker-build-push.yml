name: Docker build and push

on:
    push:
        branches: [main]
    
    jobs:
        build-and-push:
            runs-on: ubuntu-latest


            steps:

                -name: code checkout
                 uses: actions/checkout@v4

                -name: login to docker hub
                 uses: docker/login-actions@v3
                 with:
                    username: ${{ vars.DOCKERHUB_USER }}
                              ${{ secrets.DOCKERHUB_TOKEN }}
                -name: build & push to docker hub
                 uses: Docker/build-push-actions@v6
                 with:
                    context:
                    push: true
                    tags: | 
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.ref-name}}
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
                    ${{ vars.DOCKERHUB_USER}}/github-actions-app: ${{ github.sha}}
                