name: Docker build and push

on:
  workflow_call:
       secrets:
        DOCKERHUB_TOKEN:
         required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
           context: .
           push: true
           tags: |
              manmeeetkaur/github-actions-app:${{ github.ref_name }}
              manmeeetkaur/github-actions-app:latest
              manmeeetkaur/github-actions-app:${{ github.sha }}