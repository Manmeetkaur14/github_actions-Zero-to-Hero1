# API keys, sensitive data, credentials
# git leaks
name: secrets_scan

on:
    workflow_call:


jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout_code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run gitleaks scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # git actions manages it
        
              
