name: python lint

on:
    push:
        branches: [main]


jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                python-version: ["3.9","3.10","3.12","3.13"]
    
    steps:
        - name: checkout cdoe
          uses: actions /checkout@v4

        - name: setup python 3.13
          uses: actions/setup-python@v5
          with:
            python-version: "3.13"

        - name: install dependencies
          run: pip install -r requirements.txt

        - name: run linter
          run: flake8 app.py