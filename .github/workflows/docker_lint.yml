# scan the dockerfile for issues and CVEs
name: Docker lint

on:
    workflow_call:

jobs:
    validate-dockerfile:
        runs-on: ubuntu-latest


        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Validate Dockerfile
              uses: hadolint/hadolint-actions@v3.1.0
              with:
                    dockerfile: Dockerfile


