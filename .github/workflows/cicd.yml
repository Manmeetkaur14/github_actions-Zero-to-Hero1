name: CICD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "This is the environment where this workflow runs"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        run: echo "Code clone from Github"

  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker container Build"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"

 deploy:
  if: ${{ github.event.inputs.environment == 'dev' }}
  needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
